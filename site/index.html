<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>具身智能大事纪</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <h1>具身智能大事纪</h1>
      <p class="subtitle">自动汇总 arXiv 论文、机器人公司博客与社区讨论</p>
      <div id="stats" class="stats"></div>
    </div>
  </header>

  <main class="container">
    <section id="insights" class="insights">
      <div class="insights-head">
        <h2>趋势</h2>
        <button id="table-toggle" class="text-btn">切换表格视图</button>
      </div>
      <div id="insights-charts" class="insights-grid">
        <div class="chart-card">
          <h3>近 8 周条目数</h3>
          <div id="weekly-chart"></div>
        </div>
        <div class="chart-card">
          <h3>各来源条目分布</h3>
          <div id="source-chart"></div>
        </div>
      </div>
      <div id="insights-table" class="insights-table" hidden></div>
    </section>

    <div class="controls">
      <input id="search" type="search" placeholder="搜索标题或摘要…" autocomplete="off" />

      <div class="filter-row">
        <span class="filter-label">时间</span>
        <div id="range-filters" class="chip-row"></div>
      </div>

      <div class="filter-row">
        <span class="filter-label">来源</span>
        <div id="source-filters" class="chip-row"></div>
        <div class="chip-actions">
          <button id="source-all" class="text-btn">全选</button>
          <button id="source-none" class="text-btn">清空</button>
        </div>
      </div>

      <div class="filter-row" id="tag-row" hidden>
        <span class="filter-label">公司/机构</span>
        <div id="tag-filters" class="chip-row"></div>
      </div>

      <div class="filter-row">
        <span class="filter-label"></span>
        <div class="chip-row">
          <button id="bookmark-filter" class="chip">⭐ 只看收藏</button>
        </div>
      </div>
    </div>

    <div id="empty-state" class="empty-state" hidden>没有匹配的条目。</div>
    <div id="timeline" class="timeline"></div>

    <section id="feedback" class="feedback">
      <h2>反馈 / 讨论</h2>
      <p class="feedback-hint">用 GitHub 账号登录后可以留言、点反应表情。</p>
      <div id="giscus-container"></div>
    </section>
  </main>

  <footer class="footer">
    <p>数据来源：arXiv · Boston Dynamics · The Robot Report · IEEE Spectrum · Google DeepMind · NVIDIA Blog · Hugging Face Blog · Hacker News</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
