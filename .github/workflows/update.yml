name: Update embodied AI chronicle

on:
  schedule:
    - cron: "17 1 * * *" # 每天 UTC 01:17（北京时间 09:17）跑一次
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - "site/data/events.json" # 避免 bot 自己提交数据又触发一次 push

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python scraper/fetch.py
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

      - name: Commit updated data
        run: |
          git config user.name "embodied-ai-chronicle-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data/events.json
          git diff --staged --quiet || git commit -m "chore: update events data"
          git push

      - name: Cache-bust static assets
        run: |
          SHA="${GITHUB_SHA:0:8}"
          sed -i "s/app\.js\"/app.js?v=${SHA}\"/" site/index.html
          sed -i "s/style\.css\"/style.css?v=${SHA}\"/" site/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
